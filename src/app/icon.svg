<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="key" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#FEF3C7"/>
    </linearGradient>
  </defs>
  <!-- Hexagon background (hive) -->
  <polygon points="256,20 468,148 468,364 256,492 44,364 44,148" fill="url(#bg)" rx="24"/>
  <!-- Inner hexagon border -->
  <polygon points="256,52 440,164 440,348 256,460 72,348 72,164" fill="none" stroke="#FDE68A" stroke-width="6" opacity="0.4"/>
  <!-- Key shape -->
  <!-- Key head (circle with cutout) -->
  <circle cx="220" cy="200" r="72" fill="url(#key)" opacity="0.95"/>
  <circle cx="220" cy="200" r="36" fill="url(#bg)"/>
  <!-- Key shaft -->
  <rect x="268" y="182" width="150" height="36" rx="8" fill="url(#key)" opacity="0.95"/>
  <!-- Key teeth -->
  <rect x="370" y="218" width="24" height="36" rx="4" fill="url(#key)" opacity="0.95"/>
  <rect x="406" y="218" width="24" height="48" rx="4" fill="url(#key)" opacity="0.95"/>
  <!-- Small honeycomb cells (decorative) -->
  <polygon points="130,340 150,328 170,340 170,360 150,372 130,360" fill="#FDE68A" opacity="0.3"/>
  <polygon points="170,370 190,358 210,370 210,390 190,402 170,390" fill="#FDE68A" opacity="0.25"/>
  <polygon points="90,370 110,358 130,370 130,390 110,402 90,390" fill="#FDE68A" opacity="0.2"/>
</svg>
