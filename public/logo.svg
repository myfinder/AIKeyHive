<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="kg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
  </defs>

  <!-- Honeycomb cluster (centered) -->
  <polygon points="200,22 230,39 230,73 200,90 170,73 170,39" fill="url(#g2)" stroke="#B45309" stroke-width="1.5"/>
  <polygon points="252,56 282,73 282,107 252,124 222,107 222,73" fill="url(#g3)" stroke="#B45309" stroke-width="1.5"/>
  <polygon points="200,90 230,107 230,141 200,158 170,141 170,107" fill="url(#g1)" stroke="#B45309" stroke-width="1.5"/>
  <polygon points="148,56 178,73 178,107 148,124 118,107 118,73" fill="url(#g1)" stroke="#B45309" stroke-width="1.5"/>
  <polygon points="252,124 282,141 282,175 252,192 222,175 222,141" fill="url(#g1)" stroke="#B45309" stroke-width="1.5"/>
  <polygon points="200,158 230,175 230,209 200,226 170,209 170,175" fill="url(#g3)" stroke="#B45309" stroke-width="1.5"/>
  <polygon points="148,124 178,141 178,175 148,192 118,175 118,141" fill="url(#g2)" stroke="#B45309" stroke-width="1.5"/>

  <!-- Key overlaid on honeycomb -->
  <circle cx="200" cy="107" r="26" fill="url(#kg)" stroke="#111827" stroke-width="2"/>
  <circle cx="200" cy="107" r="10" fill="url(#g1)" stroke="#B45309" stroke-width="1.5"/>
  <rect x="196" y="133" width="8" height="78" rx="3" fill="url(#kg)" stroke="#111827" stroke-width="2"/>
  <rect x="204" y="178" width="16" height="7" rx="2" fill="url(#kg)" stroke="#111827" stroke-width="1.5"/>
  <rect x="204" y="193" width="12" height="7" rx="2" fill="url(#kg)" stroke="#111827" stroke-width="1.5"/>

  <!-- Circuit dots -->
  <circle cx="170" cy="107" r="3" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="230" cy="107" r="3" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="200" cy="22" r="3" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="118" cy="141" r="3" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="282" cy="141" r="3" fill="#FEF3C7" opacity="0.8"/>

  <!-- Text: AIKeyHive -->
  <text x="200" y="255" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" letter-spacing="-1">
    <tspan fill="#F59E0B">AI</tspan><tspan fill="#1F2937">Key</tspan><tspan fill="#F59E0B">Hive</tspan>
  </text>

  <!-- Tagline -->
  <text x="200" y="275" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#6B7280" letter-spacing="0.5">
    Unified LLM API Key Management
  </text>
