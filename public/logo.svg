<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 240" width="840" height="240" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="kg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
  </defs>

  <!-- Honeycomb cluster (left side) -->
  <!-- Center -->
  <polygon points="100,82 130,99 130,133 100,150 70,133 70,99" fill="url(#g1)" stroke="#B45309" stroke-width="1.5"/>
  <!-- Top -->
  <polygon points="100,14 130,31 130,65 100,82 70,65 70,31" fill="url(#g2)" stroke="#B45309" stroke-width="1.5"/>
  <!-- Top-right -->
  <polygon points="152,48 182,65 182,99 152,116 122,99 122,65" fill="url(#g3)" stroke="#B45309" stroke-width="1.5"/>
  <!-- Bottom-right -->
  <polygon points="152,116 182,133 182,167 152,184 122,167 122,133" fill="url(#g1)" stroke="#B45309" stroke-width="1.5"/>
  <!-- Bottom -->
  <polygon points="100,150 130,167 130,201 100,218 70,201 70,167" fill="url(#g3)" stroke="#B45309" stroke-width="1.5"/>
  <!-- Bottom-left -->
  <polygon points="48,116 78,133 78,167 48,184 18,167 18,133" fill="url(#g2)" stroke="#B45309" stroke-width="1.5"/>
  <!-- Top-left -->
  <polygon points="48,48 78,65 78,99 48,116 18,99 18,65" fill="url(#g1)" stroke="#B45309" stroke-width="1.5"/>

  <!-- Key overlaid on honeycomb -->
  <circle cx="100" cy="99" r="26" fill="url(#kg)" stroke="#111827" stroke-width="2"/>
  <circle cx="100" cy="99" r="10" fill="url(#g1)" stroke="#B45309" stroke-width="1.5"/>
  <rect x="96" y="125" width="8" height="78" rx="3" fill="url(#kg)" stroke="#111827" stroke-width="2"/>
  <rect x="104" y="170" width="16" height="7" rx="2" fill="url(#kg)" stroke="#111827" stroke-width="1.5"/>
  <rect x="104" y="185" width="12" height="7" rx="2" fill="url(#kg)" stroke="#111827" stroke-width="1.5"/>

  <!-- Circuit dots -->
  <circle cx="70" cy="99" r="3" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="130" cy="99" r="3" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="100" cy="14" r="3" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="18" cy="133" r="3" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="182" cy="133" r="3" fill="#FEF3C7" opacity="0.8"/>

  <!-- Text: AIKeyHive -->
  <text x="230" y="140" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#1F2937" letter-spacing="-2">
    <tspan fill="#F59E0B">AI</tspan><tspan fill="#1F2937">Key</tspan><tspan fill="#F59E0B">Hive</tspan>
  </text>

  <!-- Tagline -->
  <text x="232" y="172" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#6B7280" letter-spacing="0.5">
    Unified LLM API Key Management
  </text>
</svg>
