<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FBBF24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Honeycomb hexagons -->
  <!-- Center hex -->
  <polygon points="256,148 308,178 308,238 256,268 204,238 204,178" fill="url(#grad1)" stroke="#B45309" stroke-width="2"/>
  <!-- Top-right hex -->
  <polygon points="316,108 368,138 368,198 316,228 264,198 264,138" fill="url(#grad2)" stroke="#B45309" stroke-width="2"/>
  <!-- Bottom-right hex -->
  <polygon points="316,228 368,258 368,318 316,348 264,318 264,258" fill="url(#grad3)" stroke="#B45309" stroke-width="2"/>
  <!-- Bottom hex -->
  <polygon points="256,268 308,298 308,358 256,388 204,358 204,298" fill="url(#grad2)" stroke="#B45309" stroke-width="2"/>
  <!-- Bottom-left hex -->
  <polygon points="196,228 248,258 248,318 196,348 144,318 144,258" fill="url(#grad1)" stroke="#B45309" stroke-width="2"/>
  <!-- Top-left hex -->
  <polygon points="196,108 248,138 248,198 196,228 144,198 144,138" fill="url(#grad3)" stroke="#B45309" stroke-width="2"/>
  <!-- Top hex -->
  <polygon points="256,28 308,58 308,118 256,148 204,118 204,58" fill="url(#grad1)" stroke="#B45309" stroke-width="2"/>

  <!-- Key icon overlaid -->
  <!-- Key head (circle with hole) -->
  <circle cx="256" cy="178" r="42" fill="url(#keyGrad)" stroke="#111827" stroke-width="3"/>
  <circle cx="256" cy="178" r="16" fill="url(#grad1)" stroke="#B45309" stroke-width="2"/>

  <!-- Key shaft -->
  <rect x="249" y="220" width="14" height="140" rx="4" fill="url(#keyGrad)" stroke="#111827" stroke-width="3"/>

  <!-- Key teeth -->
  <rect x="263" y="310" width="28" height="12" rx="3" fill="url(#keyGrad)" stroke="#111827" stroke-width="2"/>
  <rect x="263" y="335" width="20" height="12" rx="3" fill="url(#keyGrad)" stroke="#111827" stroke-width="2"/>

  <!-- Subtle AI circuit dots on hexagons -->
  <circle cx="204" cy="178" r="4" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="308" cy="178" r="4" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="256" cy="148" r="4" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="256" cy="268" r="4" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="144" cy="258" r="4" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="368" cy="258" r="4" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="308" cy="58" r="4" fill="#FEF3C7" opacity="0.8"/>
  <circle cx="204" cy="58" r="4" fill="#FEF3C7" opacity="0.8"/>

  <!-- Connection lines (AI circuit feel) -->
  <line x1="204" y1="178" x2="220" y2="178" stroke="#FEF3C7" stroke-width="2" opacity="0.5"/>
  <line x1="292" y1="178" x2="308" y2="178" stroke="#FEF3C7" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="148" x2="256" y2="136" stroke="#FEF3C7" stroke-width="2" opacity="0.5"/>
  <line x1="256" y1="268" x2="256" y2="280" stroke="#FEF3C7" stroke-width="2" opacity="0.5"/>
</svg>
